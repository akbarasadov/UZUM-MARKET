<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzum Market</title>
    <link rel="stylesheet" href="/src/product.css">
    <link rel="stylesheet"
        href="https://gistcdn.githack.com/mfd/09b70eb47474836f25a21660282ce0fd/raw/e06a670afcb2b861ed2ac4a1ef752d062ef6b46b/Gilroy.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/index.html">
                <img class="uzum_logo" src="/public/logo1.png" alt="">
            </a>
            <div class="catalog"></div>
            <input type="search" placeholder="Искать товары">
            <div class="right">
                <div class="sign-in block">
                    <img src="/public/account.webp" alt="">
                    <p>Войти</p>
                </div>
                <div class="love block">
                    <img src="/public/love.png" alt="">
                    <p> Избранное </p>
                </div>
                <div class="basket block">
                    <img src="/public/Basket.png" alt="">
                    <p>Корзина</p>
                </div>
            </div>
        </div>
        <div class="grid"></div>


        <div class="products_place"></div>
    </div>

    <script type="module" src="/src/script.js"></script>
</body>

</html>
