<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzum Market</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">

        <div class="categories"></div>

        <div class="slider-wrapper">
            <button class="arrow left">&#10094;</button>

            <div class="slider-track">
                <div class="slide">
                    <img src="https://images.uzum.uz/d0m3a1a7s4fo7mqa2i50/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d07mq6ei4n37npaqijd0/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0mnv9q7s4fo7mqa7hg0/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0e9nfgn274j5sclsocg/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0gutcq7s4fo7mq8til0/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0m17pa7s4fo7mqa1olg/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0m1dha7s4fo7mqa1qcg/main_page_banner.jpg" alt="">
                </div>
                <div class="slide">
                    <img src="https://images.uzum.uz/d0hdn7a7s4fo7mq90060/main_page_banner.jpg" alt="">
                </div>
            </div>

            <button class="arrow right">&#10095;</button>
            <div class="slider-dots"></div>
        </div>



        <div class="products">
            <div class="grid">

            </div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>

</html>
